<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>
  <style>
    .hero {
  height: 90vh;
  background:#008000; 
  /* background: url('https://images.unsplash.com/photo-1559028012-481c04fa702d') no-repeat center center/cover; */
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  color: white;
}

/* Dark overlay */
.hero::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

/* Content above overlay */
.hero-content {
  position: relative;
  text-align: center;
  z-index: 2;
}

.hero h1 {
  font-size: 50px;
  margin-bottom: 10px;
}

.hero p {
  font-size: 20px;
}

.btn {
  background: #fff;
  color: #000;
  padding: 12px 25px;
  text-decoration: none;
  border-radius: 5px;
  margin-top: 15px;
  display: inline-block;
  font-weight: bold;
}
  </style>
</head>
<body>
  <section class="hero">
  <div class="hero-content">
    <h1>Shopify Developer 🚀</h1>
    <p>I build high-converting Shopify stores & custom apps</p>
    <a href="#contact" class="btn">Hire Me</a>
  </div>
</section>
</body>
</html>
